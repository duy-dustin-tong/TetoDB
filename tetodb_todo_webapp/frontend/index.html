<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TetoDB Todo</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>TetoDB Todo (Static UI)</h1>

      <section class="category-section">
        <h3>Categories</h3>
        <ul id="cat-list" class="cat-list"></ul>
        <form id="cat-form">
          <input id="cat-name" placeholder="New category" />
          <button type="submit">Add</button>
        </form>
      </section>

      <form id="todo-form" class="todo-form">
        <input id="todo-title" placeholder="Add a task" />
        <select id="todo-cat">
          <option value="">No Category</option>
        </select>
        <button type="submit">Add Task</button>
      </form>

      <div class="toolbar">
        <span id="total-count">Total: 0</span>
        <span id="done-count">Done: 0</span>
        <button id="clear-completed" type="button">Clear completed</button>
      </div>

      <p id="error" class="error" style="display:none"></p>
      <ul id="todo-list" class="todo-list"></ul>
    </main>

    <script src="app.js"></script>
  </body>
</html>
